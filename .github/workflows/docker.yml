name: Build & Push Docker Images

on:
  push:
    branches: [main, master]
    paths:
      - 'gateway/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'
  workflow_dispatch:   # permite disparar manualmente desde la UI de GitHub

env:
  REGISTRY: ghcr.io
  # Se forma automáticamente: ghcr.io/TU-USUARIO/miclaw-gateway
  IMAGE_GATEWAY:  ghcr.io/${{ github.repository_owner }}/miclaw-gateway
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/miclaw-frontend

jobs:
  build-gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necesario para pushear a ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_GATEWAY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: Build & push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache entre builds para acelerar compilaciones Go
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  build-frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=/api
            VITE_API_KEY=${{ secrets.MICLAW_AGENT_KEY || 'changeme' }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
