services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - miclaw-net

  miclaw-gateway:
    build: ./gateway
    container_name: miclaw-gateway
    ports:
      - "3001:3000"
    volumes:
      - miclaw-data:/app
      - ./gateway/eliza_rules.json:/app/eliza_rules.json
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - OLLAMA_URL=http://ollama:11434/api/chat
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi4-mini:3.8b}
      - SAFETY_MODEL=${SAFETY_MODEL:-phi4-mini:3.8b}
      - MICLAW_AGENT_KEY=${MICLAW_AGENT_KEY}
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - miclaw-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=False
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=duckduckgo
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - miclaw-net

volumes:
  ollama_data:
  miclaw-data:
  openwebui_data:

networks:
  miclaw-net:
    name: miclaw-net
