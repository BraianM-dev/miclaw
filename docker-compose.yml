# ════════════════════════════════════════════════════════════════
#  miclaw2 — stack completo v2
#
#  SETUP en Portainer:
#  1. Stacks → Add stack → Repository
#  2. Repository URL: https://github.com/BraianM-dev/miclaw
#  3. Repository reference: refs/heads/main
#  4. Compose path: docker-compose.yml
#  5. Environment variables:
#       MICLAW_AGENT_KEY = (tu clave secreta)
#  6. Deploy
# ════════════════════════════════════════════════════════════════

services:

  # ── Ollama (LLM local) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    networks:
      - miclaw-net

  # ── Pull del modelo al iniciar ────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    restart: "no"
    depends_on:
      - ollama
    entrypoint: >
      sh -c "sleep 10 && ollama pull ${OLLAMA_MODEL:-phi4-mini:3.8b}"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - miclaw-net

  # ── Gateway ───────────────────────────────────────────────────
  miclaw-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: miclaw-gateway
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "${GATEWAY_PORT:-3001}:3000"
    volumes:
      - gateway_data:/app/data
      - gateway_logs:/app/logs
    environment:
      - PORT=3000
      - DB_PATH=/app/data/miclaw.db
      - QUEUE_DB=/app/data/queue.db
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi4-mini:3.8b}
      - MICLAW_AGENT_KEY=${MICLAW_AGENT_KEY:-changeme}
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    networks:
      - miclaw-net

  # ── Frontend ──────────────────────────────────────────────────
  miclaw-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: miclaw-frontend
    restart: unless-stopped
    depends_on:
      - miclaw-gateway
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    networks:
      - miclaw-net

  # ── Open-WebUI (opcional) ─────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=False
    networks:
      - miclaw-net

volumes:
  ollama_data:
    name: miclaw_ollama_data
  gateway_data:
    name: miclaw_gateway_data
  gateway_logs:
    name: miclaw_gateway_logs
  openwebui_data:
    name: miclaw_openwebui_data

networks:
  miclaw-net:
    name: miclaw-net
    driver: bridge
