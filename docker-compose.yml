# ════════════════════════════════════════════════════════════════
#  miclaw2 — stack completo v2
#
#  Servicios:
#    ollama          — LLM local (phi4-mini:3.8b)
#    ollama-pull     — job único de descarga del modelo
#    miclaw-gateway  — backend Go (REST API + SSE)
#    miclaw-frontend — dashboard React (nginx)
#    open-webui      — interfaz Ollama (opcional)
#
#  Inicio rápido:
#    cp .env.example .env   # ajustar MICLAW_AGENT_KEY
#    docker compose up -d
#    # dashboard → http://localhost:${DASHBOARD_PORT:-8080}
#    # gateway   → http://localhost:${GATEWAY_PORT:-3001}
# ════════════════════════════════════════════════════════════════

services:

  # ── Ollama (LLM local) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU: descomentar si hay GPU NVIDIA disponible
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - miclaw-net

  # ── Pull del modelo al iniciar (job único) ────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "ollama pull ${OLLAMA_MODEL:-phi4-mini:3.8b}"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - miclaw-net

  # ── Gateway principal (Go backend) ───────────────────────────
  miclaw-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: miclaw-gateway
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-3001}:3000"
    volumes:
      - gateway_data:/app/data
      - gateway_configs:/app/configs
      - gateway_plugins:/app/plugins
      - gateway_logs:/app/logs
      - ./gateway/configs:/app/configs:ro
    environment:
      - PORT=3000
      - DB_PATH=/app/data/miclaw.db
      - QUEUE_DB=/app/data/queue.db
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi4-mini:3.8b}
      - MICLAW_AGENT_KEY=${MICLAW_AGENT_KEY:-changeme}
      - MANIFEST_PATH=/app/configs/manifest.json
      - DATA_DIR=/app/configs
      - PLUGINS_DIR=/app/plugins
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - miclaw-net

  # ── Dashboard Frontend (React + nginx) ───────────────────────
  miclaw-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_API_KEY=${MICLAW_AGENT_KEY:-changeme}
    container_name: miclaw-frontend
    restart: unless-stopped
    depends_on:
      miclaw-gateway:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    networks:
      - miclaw-net

  # ── Open-WebUI (interfaz Ollama — opcional) ───────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=False
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=duckduckgo
    networks:
      - miclaw-net

# ════════════════════════════════════════════════════════════════
#  Volumes
# ════════════════════════════════════════════════════════════════
volumes:
  ollama_data:
    name: miclaw_ollama_data
  gateway_data:
    name: miclaw_gateway_data
  gateway_configs:
    name: miclaw_gateway_configs
  gateway_plugins:
    name: miclaw_gateway_plugins
  gateway_logs:
    name: miclaw_gateway_logs
  openwebui_data:
    name: miclaw_openwebui_data

# ════════════════════════════════════════════════════════════════
#  Red interna
# ════════════════════════════════════════════════════════════════
networks:
  miclaw-net:
    name: miclaw-net
    driver: bridge
